services:
  comzezarl-db:
    image: mariadb:11
    container_name: comzezarl-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - comzezarl_db_data:/var/lib/mysql
    networks:
      - comzezarl_net

  comzezarl-wp:
    image: wordpress:php8.3-apache
    container_name: comzezarl-wp
    restart: unless-stopped
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: comzezarl-db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
    volumes:
      - comzezarl_wp_data:/var/www/html
    depends_on:
      - comzezarl-db
    networks:
      - comzezarl_net

volumes:
  comzezarl_db_data:
  comzezarl_wp_data:

networks:
  comzezarl_net:
    driver: bridge